<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#507ca8">
    <title>个人求职简介 - 项目详情</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <header></header>

    <!-- 项目详情内容 -->
    <main class="project-detail-content">
        <div class="container">
            <a href="projects.html" class="back-btn">返回项目列表</a>
            <h2 class="section-title" id="project-title"></h2>

            <!-- 项目主图展示区 -->
            <section class="project-gallery">
                <div class="gallery-container"></div>
                <div class="gallery-indicators"></div>
            </section>

            <!-- 项目详细信息 -->
            <section class="project-info">
                <div class="info-section">
                    <h3>项目描述</h3>
                    <p id="project-description"></p>
                </div>
                <div class="info-section">
                    <h3>技术栈</h3>
                    <div class="tech-stack" id="project-tech-stack"></div>
                </div>
                <div class="info-section">
                    <h3>项目链接</h3>
                    <div class="project-links">
                        <a href="#" class="link-btn" id="project-demo">查看演示</a>
                        <a href="#" class="link-btn" id="project-github">GitHub仓库</a>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- 页脚 -->
    <footer></footer>

    <script type="module" src="js/main.js"></script>
</body>
</html>
