<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人求职简介 - 联系方式</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <header>
        <nav class="navbar">
            <div class="container">
                <div class="logo">
                    <img src="images/ui/3y7.jpeg" alt="Logo" class="logo-img">
                    <h1>我的简历</h1>
                </div>
                <ul class="nav-menu">
                    <li><a href="index.html">首页</a></li>
                    <li><a href="about.html">个人简介</a></li>
                    <li><a href="projects.html">项目展示</a></li>
                    <li><a href="contact.html" class="active">联系方式</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <!-- 联系方式内容 -->
    <main class="contact-content">
        <div class="container">
            <h2 class="section-title">联系方式</h2>

            <div class="contact-container">
                <!-- 联系表单 -->
                <section class="contact-form">
                    <h3>发送消息</h3>
                    <form id="contactForm">
                        <div class="form-group">
                            <label for="name">代号：</label>
                            <input type="text" id="name" name="name" required>
                            <span class="error-message" id="name-error"></span>
                        </div>
                        <div class="form-group">
                            <label for="email">邮箱：</label>
                            <input type="email" id="email" name="email" required>
                            <span class="error-message" id="email-error"></span>
                        </div>
                        <div class="form-group">
                            <label for="subject">Top：</label>
                            <input type="text" id="subject" name="subject" required>
                            <span class="error-message" id="subject-error"></span>
                        </div>
                        <div class="form-group">
                            <label for="message">Say my name!：</label>
                            <textarea id="message" name="message" rows="5" required></textarea>
                            <span class="error-message" id="message-error"></span>
                        </div>
                        <button type="submit" class="submit-btn">咕咕bird传书</button>
                    </form>
                </section>

                <!-- 附加信息 -->
                <section class="contact-info">
                    <h3>联系方式</h3>
                    <div class="info-item">
                        <img src="images/ui/telephone.png" alt="电话" class="info-icon">
                        <span class="info-label">电话：</span>
                        <span class="info-value">11451419198</span>
                    </div>
                    <div class="info-item">
                        <img src="images/ui/email.png" alt="邮箱" class="info-icon">
                        <span class="info-label">邮箱：</span>
                        <span class="info-value">1433223@qq.com</span>
                    </div>
                    <div class="info-item">
                        <img src="images/ui/wechat.png" alt="微信" class="info-icon">
                        <span class="info-label">微信：</span>
                        <span class="info-value">yanamikawaii</span>
                    </div>
                    <div class="info-item">
                        <img src="images/ui/github-mark.png" alt="GitHub" class="info-icon">
                        <span class="info-label">GitHub：</span>
                        <span class="info-value"><a href="#">pubhub.com/like</a></span>
                    </div>

                    <div class="info-item">
                        <span class="info-label">地址：</span>
                        <span class="info-value">广州市黑云区太平天国广粥理公学院</span>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-info">
                    <h3>Yanami</h3>
                    <p>Java后端开发工程师</p>
                    <p>邮箱：1433223@qq.com</p>
                    <p>电话：11451419198</p>
                </div>
                <div class="footer-links">
                    <a href="index.html">首页</a>
                    <a href="about.html">个人简介</a>
                    <a href="projects.html">项目展示</a>
                    <a href="contact.html">联系方式</a>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2077 Yanami. 保留所有权利.</p>
            </div>
        </div>
    </footer>

    <script type="module" src="js/main.js"></script>
</body>
</html>
